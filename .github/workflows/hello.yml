name : My First Workflow

on: push

jobs:
  say-hello:     
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello, Github Actions!"
      
      - name: Print my name
        run: echo "My name is Vishesh Goel"

  say-bye:
    runs-on: ubuntu-latest

    steps:
      - name: Print goodbye message
        run: echo "Goodbye from second job!"  
    